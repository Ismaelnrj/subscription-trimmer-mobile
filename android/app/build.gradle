apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"

def projectRoot = rootDir.getAbsoluteFile().getParentFile().getAbsolutePath()

static def versionToNumber(major, minor, patch) {
  return patch * 100 + minor * 10000 + major * 1000000
}

def getRNVersion() {
  def version = providers.exec {
    workingDir(projectDir)
    commandLine("node", "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()

  def coreVersion = version.split("-")[0]
  def (major, minor, patch) = coreVersion.tokenize('.').collect { it.toInteger() }

  return versionToNumber(
      major,
      minor,
      patch
  )
}
def rnVersion = getRNVersion()

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    entryFile = file(["node", "-e", "require('expo/scripts/resolveAppEntry')", projectRoot, "android", "absolute"].execute(null, rootDir).text.trim())
    reactNativeDir = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()
    hermesCommand = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsolutePath() + "/sdks/hermesc/%OS-BIN%/hermesc"
    codegenDir = new File(["node", "--print", "require.resolve('@react-native/codegen/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()

    // Use Expo CLI to bundle the app, this ensures the Metro config
    // works correctly with Expo projects.
    cliFile = new File(["node", "--print", "require.resolve('@expo/cli', { paths: [require.resolve('expo/package.json')] })"].execute(null, rootDir).text.trim())
    bundleCommand = "export:embed"

    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '..'
    // root = file("../")
    //   The folder where the react-native NPM package is. Default is ../node_modules/react-native
    // reactNativeDir = file("../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../node_modules/@react-native/codegen
    // codegenDir = file("../node_modules/@react-native/codegen")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]

    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    if (rnVersion >= versionToNumber(0, 75, 0)) {
        /* Autolinking */
        autolinkLibrariesWithApp()
    }
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = (findProperty('android.enableProguardInReleaseBuilds') ?: false).toBoolean()

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = 'org.webkit:android-jsc-intl:+'`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion

    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.subtrimmer"
    defaultConfig {
        applicationId "com.subtrimmer"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 14
        versionName "1.0"
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            storeFile file(System.getenv("CM_KEYSTORE_PATH") ?: 'debug.keystore')
            storePassword System.getenv("CM_KEYSTORE_PASSWORD") ?: 'android'
            keyAlias System.getenv("CM_KEY_ALIAS") ?: 'androiddebugkey'
            keyPassword System.getenv("CM_KEY_PASSWORD") ?: 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            shrinkResources (findProperty('android.enableShrinkResourcesInReleaseBuilds')?.toBoolean() ?: false)
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            crunchPngs (findProperty('android.enablePngCrunchInReleaseBuilds')?.toBoolean() ?: true)
        }
    }
    packagingOptions {
        jniLibs {
            useLegacyPackaging (findProperty('expo.useLegacyPackaging')?.toBoolean() ?: false)
        }
    }
}

// Apply static values from `gradle.properties` to the `android.packagingOptions`
// Accepts values in comma delimited lists, example:
// android.packagingOptions.pickFirsts=/LICENSE,**/picasa.ini
["pickFirsts", "excludes", "merges", "doNotStrip"].each { prop ->
    // Split option: 'foo,bar' -> ['foo', 'bar']
    def options = (findProperty("android.packagingOptions.$prop") ?: "").split(",");
    // Trim all elements in place.
    for (i in 0..<options.size()) options[i] = options[i].trim();
    // `[] - ""` is essentially `[""].filter(Boolean)` removing all empty strings.
    options -= ""

    if (options.length > 0) {
        println "android.packagingOptions.$prop += $options ($options.length)"
        // Ex: android.packagingOptions.pickFirsts += '**/SCCS/**'
        options.each {
            android.packagingOptions[prop] += it
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    def isGifEnabled = (findProperty('expo.gif.enabled') ?: "") == "true";
    def isWebpEnabled = (findProperty('expo.webp.enabled') ?: "") == "true";
    def isWebpAnimatedEnabled = (findProperty('expo.webp.animated') ?: "") == "true";

    if (isGifEnabled) {
        // For animated gif support
        implementation("com.facebook.fresco:animated-gif:${reactAndroidLibs.versions.fresco.get()}")
    }

    if (isWebpEnabled) {
        // For webp support
        implementation("com.facebook.fresco:webpsupport:${reactAndroidLibs.versions.fresco.get()}")
        if (isWebpAnimatedEnabled) {
            // Animated webp support
            implementation("com.facebook.fresco:animated-webp:${reactAndroidLibs.versions.fresco.get()}")
        }
    }

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

if (rnVersion < versionToNumber(0, 75, 0)) {
    apply from: new File(["node", "--print", "require.resolve('@react-native-community/cli-platform-android/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim(), "../native_modules.gradle");
    applyNativeModulesAppBuildGradle(project)
}

// ── Autolinking JSON patch ────────────────────────────────────────────────────
// All dependsOn-based approaches failed because generateAutolinkingPackageList is
// realized too late in Gradle's graph-building phase for the hook to register the
// dependency. The correct fix: tasks.withType(GeneratePackageListTask).configureEach
// { doFirst } — adds an action directly to the task so it runs before @TaskAction,
// with no dependency-graph change required.

// Layer 1: Configuration-time diagnostic + write (logger.warn always visible in logs).
{
    def autolinkFile = rootProject.layout.buildDirectory
        .file("generated/autolinking/autolinking.json").get().asFile
    if (autolinkFile.exists()) {
        try {
            def p = new groovy.json.JsonSlurper().parseText(autolinkFile.text)
            logger.warn("[patchAutolinking] cfg: packageName=${p?.project?.android?.packageName} deps=${p?.dependencies?.size()}")
        } catch (e) {
            logger.error("[patchAutolinking] cfg: parse error: ${e.message}")
        }
    } else {
        logger.warn("[patchAutolinking] cfg: autolinking.json missing — writing now")
    }
    autolinkFile.parentFile.mkdirs()
    def cfgScript = new File(rootProject.projectDir.parentFile, 'scripts/generate-autolinking-config.js')
    if (cfgScript.exists()) {
        def out = new StringWriter(), err = new StringWriter()
        def proc = ['node', '--no-warnings', cfgScript.absolutePath].execute(null, rootProject.projectDir.parentFile)
        proc.consumeProcessOutput(out, err)
        proc.waitFor()
        def json = out.toString().trim()
        if (proc.exitValue() == 0 && !json.isEmpty()) {
            autolinkFile.text = json
            logger.warn("[patchAutolinking] cfg write OK: ${json.length()} bytes")
        } else {
            logger.error("[patchAutolinking] cfg write FAILED: exit=${proc.exitValue()} err=${err.toString().take(300)}")
        }
    } else {
        logger.error("[patchAutolinking] cfg: script not found at ${cfgScript}")
    }
}

// Layer 2: Execution-time doFirst — fires when the task is configured (realized),
// before @TaskAction runs. No dependency-graph changes needed.
tasks.withType(com.facebook.react.tasks.GeneratePackageListTask).configureEach { task ->
    task.doFirst {
        def f = task.autolinkInputFile.get().asFile
        if (f.exists()) {
            try {
                def cur = new groovy.json.JsonSlurper().parseText(f.text)
                System.err.println("[patchAutolinking] doFirst: packageName=${cur?.project?.android?.packageName} deps=${cur?.dependencies?.size()}")
                if (cur?.project?.android?.packageName) return
            } catch (e) {
                System.err.println("[patchAutolinking] doFirst: parse error: ${e.message}")
            }
        } else {
            System.err.println("[patchAutolinking] doFirst: file missing")
        }
        f.parentFile.mkdirs()
        def sf = new File(rootProject.projectDir.parentFile, 'scripts/generate-autolinking-config.js')
        if (sf.exists()) {
            def out = new StringWriter(), err = new StringWriter()
            def proc = ['node', '--no-warnings', sf.absolutePath].execute(null, rootProject.projectDir.parentFile)
            proc.consumeProcessOutput(out, err)
            proc.waitFor()
            def json = out.toString().trim()
            System.err.println("[patchAutolinking] doFirst script: exit=${proc.exitValue()} len=${json.length()}")
            if (proc.exitValue() == 0 && !json.isEmpty()) {
                f.text = json
                System.err.println("[patchAutolinking] doFirst: wrote autolinking.json")
                return
            }
            System.err.println("[patchAutolinking] doFirst script failed: ${err.toString().take(200)}")
        }
        def text = f.exists() ? f.text : '{}'
        def parsed = new groovy.json.JsonSlurper().parseText(text)
        parsed.project = parsed.project ?: [:]
        parsed.project.android = parsed.project.android ?: [:]
        if (!parsed.project.android.packageName) { parsed.project.android.packageName = 'com.subtrimmer' }
        parsed.project.android.applicationId = parsed.project.android.applicationId ?: 'com.subtrimmer'
        parsed.project.android.sourceDir = parsed.project.android.sourceDir ?: rootProject.projectDir.absolutePath
        parsed.project.android.appName = parsed.project.android.appName ?: 'app'
        parsed.project.android.mainActivity = parsed.project.android.mainActivity ?: '.MainActivity'
        if (!parsed.reactNativeVersion) { parsed.reactNativeVersion = '0.79.6' }
        f.text = groovy.json.JsonOutput.toJson(parsed)
        System.err.println("[patchAutolinking] doFirst fallback: packageName=${parsed.project.android.packageName}")
    }
}

// Strip sensitive permissions from the merged manifest after Gradle merges it.
// Uses afterEvaluate so tasks are fully registered before we hook into them.
// Hardcoded regex strings (no Pattern.quote) to avoid Groovy GString expansion issues.
afterEvaluate {
    android.applicationVariants.each { variant ->
        def taskName = "process${variant.name.capitalize()}Manifest"
        def manifestTask = tasks.findByName(taskName)
        if (manifestTask == null) return

        manifestTask.doLast {
            // AGP writes the merged manifest to one of these two locations
            def candidates = [
                new File("${buildDir}/intermediates/merged_manifests/${variant.name}/AndroidManifest.xml"),
                new File("${buildDir}/intermediates/merged_manifests/${variant.name}/${taskName}/AndroidManifest.xml"),
                new File("${buildDir}/intermediates/bundle_manifest/${variant.name}/AndroidManifest.xml"),
            ]
            // Also do a broad search as a fallback
            def found = candidates.find { it.exists() }
            if (found == null) {
                fileTree(dir: "${buildDir}/intermediates") {
                    include "**/AndroidManifest.xml"
                }.each { f ->
                    if (f.absolutePath.contains(variant.name) && found == null) found = f
                }
            }
            if (found == null) {
                println "[strip-perms] WARNING: merged manifest not found for variant ${variant.name}"
                return
            }

            def content = found.text
            def original = content
            // Each permission stripped individually (no Pattern.quote — literals only)
            content = content.replaceAll(/\s*<uses-permission[^>]*android:name="android\.permission\.READ_MEDIA_IMAGES"[^>]*\/>/, "")
            content = content.replaceAll(/\s*<uses-permission[^>]*android:name="android\.permission\.READ_MEDIA_VIDEO"[^>]*\/>/, "")
            content = content.replaceAll(/\s*<uses-permission[^>]*android:name="android\.permission\.READ_MEDIA_VISUAL_USER_SELECTED"[^>]*\/>/, "")
            content = content.replaceAll(/\s*<uses-permission[^>]*android:name="android\.permission\.READ_EXTERNAL_STORAGE"[^>]*\/>/, "")
            content = content.replaceAll(/\s*<uses-permission[^>]*android:name="android\.permission\.WRITE_EXTERNAL_STORAGE"[^>]*\/>/, "")
            content = content.replaceAll(/\s*<uses-permission[^>]*android:name="android\.permission\.CAMERA"[^>]*\/>/, "")
            content = content.replaceAll(/\s*<uses-permission[^>]*android:name="android\.permission\.RECORD_AUDIO"[^>]*\/>/, "")
            content = content.replaceAll(/\s*<uses-permission[^>]*android:name="android\.permission\.SYSTEM_ALERT_WINDOW"[^>]*\/>/, "")
            if (content != original) {
                found.text = content
                println "[strip-perms] Cleaned merged manifest: ${found.absolutePath}"
            } else {
                println "[strip-perms] No banned permissions found in: ${found.absolutePath}"
            }
        }
    }
}
