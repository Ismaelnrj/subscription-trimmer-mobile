// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = findProperty('android.buildToolsVersion') ?: '34.0.0'
        minSdkVersion = Integer.parseInt(findProperty('android.minSdkVersion') ?: '23')
        compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '34')
        targetSdkVersion = Integer.parseInt(findProperty('android.targetSdkVersion') ?: '34')
        kotlinVersion = findProperty('android.kotlinVersion') ?: '1.9.23'

        ndkVersion = "26.1.10909125"
    }
    // Force Kotlin 1.9.23 so the React Native BOM cannot downgrade it to 1.8.
    configurations.all {
        resolutionStrategy.force 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.23'
        resolutionStrategy.force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.23'
        resolutionStrategy.force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.23'
        resolutionStrategy.force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.23'
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath('com.android.tools.build:gradle')
        classpath('com.facebook.react:react-native-gradle-plugin')
        classpath('org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.23')
    }
}

// Gradle 8 compatibility: re-declare SDK versions at the root project ext level.
// In Gradle 8, buildscript { ext {} } properties may not be visible to submodules
// via rootProject.ext.has() / rootProject.ext.get(). Declaring them here at the
// top-level ext ensures they are always reachable by safeExtGet() calls in expo
// and other library modules.
ext {
    compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '34')
    targetSdkVersion  = Integer.parseInt(findProperty('android.targetSdkVersion')  ?: '34')
    minSdkVersion     = Integer.parseInt(findProperty('android.minSdkVersion')      ?: '23')
    buildToolsVersion = findProperty('android.buildToolsVersion') ?: '34.0.0'
    kotlinVersion     = findProperty('android.kotlinVersion')     ?: '1.9.23'
    ndkVersion        = "26.1.10909125"
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url(new File(['node', '--print', "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim(), '../android'))
        }
        maven {
            // Android JSC is installed from npm
            url(new File(['node', '--print', "require.resolve('jsc-android/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim(), '../dist'))
        }

        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
}

// Gradle 8 compatibility: ensure compileSdk is always set for every Android
// library submodule. This hook fires when the com.android.library plugin is
// applied (during project evaluation, NOT in afterEvaluate), so it is safe
// under Gradle 8.8 which forbids afterEvaluate on already-evaluated projects.
// Using compileSdk (the non-deprecated API) guarantees AGP 7/8 compatibility.
allprojects {
    plugins.withId("com.android.library") {
        android {
            compileSdk 34
        }
    }
}

// expo-modules-core@1.12.26 uses Kotlin 1.9 features (data objects, reload API).
// Force languageVersion 1.9 on every KotlinCompile task so the React Native BOM
// cannot silently downgrade it to 1.8 via the unversioned kotlin-gradle-plugin.
allprojects {
    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
        kotlinOptions {
            languageVersion = '1.9'
            apiVersion      = '1.9'
            jvmTarget       = '17'
        }
    }
}
