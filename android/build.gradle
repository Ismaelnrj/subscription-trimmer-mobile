// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = findProperty('android.buildToolsVersion') ?: '35.0.0'
        minSdkVersion = Integer.parseInt(findProperty('android.minSdkVersion') ?: '24')
        compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '36')
        targetSdkVersion = Integer.parseInt(findProperty('android.targetSdkVersion') ?: '35')
        kotlinVersion = findProperty('android.kotlinVersion') ?: '2.0.21'

        // NDK r27+ builds native libraries 16 KB-page-aligned by default, and AGP
        // 8.5.1+ auto-aligns uncompressed native libs at packaging time — both are
        // required for Google Play's 16 KB memory page size requirement.
        ndkVersion = "27.1.12297006"
    }
    // Force Kotlin 2.0.21 (the version React Native 0.79's Gradle plugin BOM
    // pins) so no transitive dependency can pull in a mismatched version.
    configurations.all {
        resolutionStrategy.force 'org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.21'
        resolutionStrategy.force 'org.jetbrains.kotlin:kotlin-stdlib:2.0.21'
        resolutionStrategy.force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:2.0.21'
        resolutionStrategy.force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.0.21'
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath('com.android.tools.build:gradle:8.9.1')
        classpath('com.facebook.react:react-native-gradle-plugin')
        classpath('org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.21')
        classpath('com.google.gms:google-services:4.4.4')
    }
}

// Gradle 8 compatibility: re-declare SDK versions at the root project ext level.
// In Gradle 8, buildscript { ext {} } properties may not be visible to submodules
// via rootProject.ext.has() / rootProject.ext.get(). Declaring them here at the
// top-level ext ensures they are always reachable by safeExtGet() calls in expo
// and other library modules.
ext {
    compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '36')
    targetSdkVersion  = Integer.parseInt(findProperty('android.targetSdkVersion')  ?: '35')
    minSdkVersion     = Integer.parseInt(findProperty('android.minSdkVersion')      ?: '24')
    buildToolsVersion = findProperty('android.buildToolsVersion') ?: '35.0.0'
    kotlinVersion     = findProperty('android.kotlinVersion')     ?: '2.0.21'
    ndkVersion        = "27.1.12297006"
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url(new File(['node', '--print', "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim(), '../android'))
        }
        maven {
            // Android JSC is installed from npm
            url(new File(['node', '--print', "require.resolve('jsc-android/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim(), '../dist'))
        }

        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
}

// Gradle 8 compatibility: ensure compileSdk is always set for every Android
// library submodule. This hook fires when the com.android.library plugin is
// applied (during project evaluation, NOT in afterEvaluate), so it is safe
// under Gradle 8.8 which forbids afterEvaluate on already-evaluated projects.
// Using compileSdk (the non-deprecated API) guarantees AGP 7/8 compatibility.
allprojects {
    plugins.withId("com.android.library") {
        android {
            compileSdk 36
        }
    }
}

// expo-modules-core (SDK 53) and the React Native 0.79 Gradle plugin both build
// against Kotlin 2.0. Force languageVersion 2.0 on every KotlinCompile task so no
// transitive dependency can silently downgrade it via an unversioned plugin.
allprojects {
    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
        kotlinOptions {
            languageVersion = '2.0'
            apiVersion      = '2.0'
            jvmTarget       = '17'
        }
    }
}

// KSP tasks (e.g. Room's annotation processor used by expo-updates) don't
// extend KotlinCompile, so the hook above never reaches them — they instead
// inherit their default languageVersion/apiVersion from the project's Kotlin
// extension (KotlinCompilation.compilerOptions), a separate mechanism from
// the per-task kotlinOptions set above. Set it there too, otherwise KSP falls
// back to a default that lags behind the apiVersion Gradle infers from the
// Kotlin 2.0.21 toolchain, causing "api-version cannot be greater than
// language-version".
allprojects {
    plugins.withId("org.jetbrains.kotlin.android") {
        kotlin {
            compilerOptions {
                languageVersion.set(org.jetbrains.kotlin.gradle.dsl.KotlinVersion.KOTLIN_2_0)
                apiVersion.set(org.jetbrains.kotlin.gradle.dsl.KotlinVersion.KOTLIN_2_0)
            }
        }
    }
}

// :app:generateAutolinkingNewArchitectureFiles writes autolinking.cpp/.cmake,
// unconditionally listing every autolinked module that declares a codegenConfig
// in its package.json — assuming that module's own generateCodegenArtifactsFromSchema
// task has already produced its android/build/generated/source/codegen/jni/ output.
// Gradle's task graph doesn't actually guarantee that ordering by default, so
// modules like @sentry/react-native and react-native-gesture-handler can lose
// the race, producing generated code that #includes a header
// (e.g. RNSentrySpec.h) which doesn't exist yet — a native build failure with
// no error until C++ compilation. Force the correct ordering explicitly once
// every subproject has been configured (and its own codegen task, if any,
// registered).
gradle.projectsEvaluated {
    def appProject = rootProject.findProject(":app")
    if (appProject == null) return
    // findByName (not tasks.matching{}.configureEach{}) — by projectsEvaluated time
    // these tasks are already registered, and configureEach's lazy-registration API
    // has stricter context rules that collide with Gradle's own task-graph
    // resolution already in flight at this point ("configureEach(Action) on task
    // set cannot be executed in the current context").
    def autolinkTask = appProject.tasks.findByName("generateAutolinkingNewArchitectureFiles")
    if (autolinkTask == null) return
    rootProject.subprojects.each { sub ->
        def codegenTask = sub.tasks.findByName("generateCodegenArtifactsFromSchema")
        if (codegenTask != null) {
            autolinkTask.dependsOn(codegenTask)
        }
    }
}
