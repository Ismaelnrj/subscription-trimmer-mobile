pluginManagement {
  def version = providers.exec {
    commandLine("node", "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()
  def (_, reactNativeMinor, reactNativePatch) = version.split("-")[0].tokenize('.').collect { it.toInteger() }

  includeBuild(new File(["node", "--print", "require.resolve('@react-native/gradle-plugin/package.json')"].execute(null, rootDir).text.trim()).getParentFile().toString())
  if(reactNativeMinor == 74 && reactNativePatch <= 3){
    includeBuild("react-settings-plugin")
  }
}

plugins { id("com.facebook.react.settings") }

def getRNMinorVersion() {
  def version = providers.exec {
    commandLine("node", "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()

  def coreVersion = version.split("-")[0]
  def (major, minor, patch) = coreVersion.tokenize('.').collect { it.toInteger() }

  return minor
}

if (getRNMinorVersion() >= 75) {
  def scriptPath = new File(rootDir.parentFile, 'scripts/generate-autolinking-config.js').absolutePath
  def autolinkingJson = new File(rootDir, 'build/generated/autolinking/autolinking.json')

  // Runs scripts/generate-autolinking-config.js (which guarantees
  // project.android.packageName is set) and returns its JSON stdout.
  def generateAutolinkingConfig = {
    def out = new StringWriter(), err = new StringWriter()
    def proc = ['node', '--no-warnings', scriptPath].execute(null, rootDir.parentFile)
    proc.consumeProcessOutput(out, err)
    proc.waitFor()
    def json = out.toString().trim()
    if (proc.exitValue() != 0 || json.isEmpty()) {
      throw new GradleException("[autolinking] script failed (exit=${proc.exitValue()}): ${err.toString().take(500)}")
    }
    return json
  }

  // ── Step 1: write autolinking.json DIRECTLY so generateAutolinkingPackageList
  // always reads the correct file regardless of RNGP caching.
  def configJson = generateAutolinkingConfig()
  autolinkingJson.parentFile.mkdirs()
  autolinkingJson.text = configJson

  // ── Step 2: tell RNGP which libraries to include as Gradle subprojects.
  // We pass a staging file (not autolinking.json itself) so copyTo never
  // operates on the same source and destination.
  def stagingFile = new File(rootDir, 'build/generated/autolinking/autolinking-staging.json')
  stagingFile.text = configJson

  extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromConfigFile(stagingFile)
    // autolinkLibrariesFromConfigFile copies stagingFile -> autolinking.json (same
    // content) and calls linkLibraries() to settings.include each Android library.
  }

  // ── Step 3: safety net. Prior fixes tried to patch autolinking.json via a
  // doFirst added through tasks.withType(GeneratePackageListTask).configureEach
  // in app/build.gradle, but that never visibly ran (no diagnostic output ever
  // appeared in build logs across several attempts) — likely because that task
  // is registered inside RNGP's own includeBuild composite build, so referencing
  // its class by name from app/build.gradle is unreliable. gradle.taskGraph
  // .beforeTask has no such dependency: it's a core Gradle API that fires for
  // every task in the graph, matched purely by name, right before that task's
  // actions run — so re-generate autolinking.json there as the final guard.
  gradle.taskGraph.beforeTask { task ->
    if (task.name == 'generateAutolinkingPackageList' || task.name == 'generateAutolinkingNewArchitectureFiles') {
      def json = generateAutolinkingConfig()
      autolinkingJson.parentFile.mkdirs()
      autolinkingJson.text = json
      def pkg = new groovy.json.JsonSlurper().parseText(json)?.project?.android?.packageName
      println("[autolinking] beforeTask ${task.name}: wrote autolinking.json, packageName=${pkg}")
      if (!pkg) {
        throw new GradleException("[autolinking] beforeTask ${task.name}: generated config is still missing project.android.packageName")
      }
    }
  }
}

