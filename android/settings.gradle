pluginManagement {
  def version = providers.exec {
    commandLine("node", "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()
  def (_, reactNativeMinor, reactNativePatch) = version.split("-")[0].tokenize('.').collect { it.toInteger() }

  // Safely execute gradle plugin resolution with error handling
  try {
    def result = ["node", "--print", "require.resolve('@react-native/gradle-plugin/package.json')"].execute(null, rootDir)
    result.waitFor()
    def output = result.text.trim()
    if (output && result.exitValue() == 0) {
      includeBuild(new File(output).getParentFile().toString())
    } else {
      println("Warning: Could not resolve @react-native/gradle-plugin")
    }
  } catch (Exception e) {
    println("Warning: Error resolving @react-native/gradle-plugin: ${e.message}")
  }
  
  if(reactNativeMinor == 74 && reactNativePatch <= 3){
    includeBuild("react-settings-plugin")
  }
}

plugins { id("com.facebook.react.settings") }

def getRNMinorVersion() {
  def version = providers.exec {
    commandLine("node", "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()

  def coreVersion = version.split("-")[0]
  def (major, minor, patch) = coreVersion.tokenize('.').collect { it.toInteger() }

  return minor
}

if (getRNMinorVersion() >= 75) {
  extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    if (System.getenv('EXPO_UNSTABLE_CORE_AUTOLINKING') == '1') {
      println('\u001B[32mUsing expo-modules-autolinking as core autolinking source\u001B[0m')
      def command = [
        'node',
        '--no-warnings',
        '--eval',
        'require(require.resolve(\'expo-modules-autolinking\', { paths: [require.resolve(\'expo/package.json\')] }))(process.argv.slice(1))',
        'react-native-config',
        '--json',
        '--platform',
        'android'
      ].toList()
      ex.autolinkLibrariesFromCommand(command)
    } else {
      ex.autolinkLibrariesFromCommand()
    }
  }
}

rootProject.name = 'SubTrimmer'

dependencyResolutionManagement {
  versionCatalogs {
    reactAndroidLibs {
      // Safely resolve react-native libs.versions.toml
      try {
        def result = ["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir)
        result.waitFor()
        def output = result.text.trim()
        if (output && result.exitValue() == 0) {
          from(files(new File(output, "../gradle/libs.versions.toml")))
        } else {
          println("Warning: Could not resolve react-native/package.json")
        }
      } catch (Exception e) {
        println("Warning: Error resolving react-native: ${e.message}")
      }
    }
  }
}

// Safely resolve expo autolinking script
try {
  def result = ["node", "--print", "require.resolve('expo/package.json')"].execute(null, rootDir)
  result.waitFor()
  def output = result.text.trim()
  if (output && result.exitValue() == 0) {
    apply from: new File(output, "../scripts/autolinking.gradle");
    useExpoModules()
  } else {
    println("Warning: Could not resolve expo/package.json")
  }
} catch (Exception e) {
  println("Warning: Error resolving expo: ${e.message}")
}

if (getRNMinorVersion() < 75) {
  // Safely resolve native modules script
  try {
    def result = ["node", "--print", "require.resolve('@react-native-community/cli-platform-android/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir)
    result.waitFor()
    def output = result.text.trim()
    if (output && result.exitValue() == 0) {
      apply from: new File(output, "../native_modules.gradle");
      applyNativeModulesSettingsGradle(settings)
    } else {
      println("Warning: Could not resolve @react-native-community/cli-platform-android")
    }
  } catch (Exception e) {
    println("Warning: Error resolving native modules: ${e.message}")
  }
}

include ':app'

// Safely resolve gradle plugin for includeBuild
try {
  def result = ["node", "--print", "require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir)
  result.waitFor()
  def output = result.text.trim()
  if (output && result.exitValue() == 0) {
    includeBuild(new File(output).getParentFile())
  } else {
    println("Warning: Could not resolve @react-native/gradle-plugin for includeBuild")
  }
} catch (Exception e) {
  println("Warning: Error resolving gradle plugin for includeBuild: ${e.message}")
}
