pluginManagement {
  def version = providers.exec {
    commandLine("node", "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()
  def (_, reactNativeMinor, reactNativePatch) = version.split("-")[0].tokenize('.').collect { it.toInteger() }

  // Fix: Use absolute path to gradle plugin instead of require.resolve
  def gradlePluginDir = new File(rootDir, "node_modules/.pnpm/@react-native+gradle-plugin@0.74.87/node_modules/@react-native/gradle-plugin")
  if (gradlePluginDir.exists()) {
    includeBuild(gradlePluginDir.toString())
  } else {
    // Fallback: try to find any version of the gradle plugin
    def gradlePluginParent = new File(rootDir, "node_modules/.pnpm")
    gradlePluginParent.eachDir { dir ->
      if (dir.name.startsWith("@react-native+gradle-plugin")) {
        def pluginDir = new File(dir, "node_modules/@react-native/gradle-plugin")
        if (pluginDir.exists()) {
          includeBuild(pluginDir.toString())
          return
        }
      }
    }
  }
  
  if(reactNativeMinor == 74 && reactNativePatch <= 3){
    includeBuild("react-settings-plugin")
  }
}

plugins { id("com.facebook.react.settings") }

def getRNMinorVersion() {
  def version = providers.exec {
    commandLine("node", "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()

  def coreVersion = version.split("-")[0]
  def (major, minor, patch) = coreVersion.tokenize('.').collect { it.toInteger() }

  return minor
}

if (getRNMinorVersion() >= 75) {
  extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    if (System.getenv('EXPO_UNSTABLE_CORE_AUTOLINKING') == '1') {
      println('\u001B[32mUsing expo-modules-autolinking as core autolinking source\u001B[0m')
      def command = [
        'node',
        '--no-warnings',
        '--eval',
        'require(require.resolve(\'expo-modules-autolinking\', { paths: [require.resolve(\'expo/package.json\')] }))(process.argv.slice(1))',
        'react-native-config',
        '--json',
        '--platform',
        'android'
      ].toList()
      ex.autolinkLibrariesFromCommand(command)
    } else {
      ex.autolinkLibrariesFromCommand()
    }
  }
}

rootProject.name = 'SubTrimmer'

dependencyResolutionManagement {
  versionCatalogs {
    reactAndroidLibs {
      // Use absolute path to react-native gradle libs
      def reactNativeDir = new File(rootDir, "node_modules/.pnpm/react-native@0.74.5_*/node_modules/react-native")
      def libsFile = null
      
      // Find the actual react-native directory (with hash suffix)
      new File(rootDir, "node_modules/.pnpm").eachDir { dir ->
        if (dir.name.startsWith("react-native@0.74.5")) {
          def candidate = new File(dir, "node_modules/react-native/gradle/libs.versions.toml")
          if (candidate.exists()) {
            libsFile = candidate
            return
          }
        }
      }
      
      if (libsFile && libsFile.exists()) {
        from(files(libsFile))
      }
    }
  }
}

// Use absolute path to expo autolinking script
def expoDir = null
new File(rootDir, "node_modules/.pnpm").eachDir { dir ->
  if (dir.name.startsWith("expo@")) {
    def candidate = new File(dir, "node_modules/expo/scripts/autolinking.gradle")
    if (candidate.exists()) {
      expoDir = candidate.getParentFile().getParentFile()
      return
    }
  }
}

if (expoDir) {
  apply from: new File(expoDir, "scripts/autolinking.gradle");
  useExpoModules()
}

if (getRNMinorVersion() < 75) {
  // Use absolute path to native modules script
  def nativeModulesDir = null
  new File(rootDir, "node_modules/.pnpm").eachDir { dir ->
    if (dir.name.startsWith("@react-native-community+cli-platform-android")) {
      def candidate = new File(dir, "node_modules/@react-native-community/cli-platform-android/native_modules.gradle")
      if (candidate.exists()) {
        nativeModulesDir = candidate.getParentFile().getParentFile()
        return
      }
    }
  }
  
  if (nativeModulesDir) {
    apply from: new File(nativeModulesDir, "native_modules.gradle");
    applyNativeModulesSettingsGradle(settings)
  }
}

include ':app'

// Use absolute path for gradle plugin includeBuild
def gradlePluginBuildDir = new File(rootDir, "node_modules/.pnpm/@react-native+gradle-plugin@0.74.87/node_modules/@react-native/gradle-plugin")
if (gradlePluginBuildDir.exists()) {
  includeBuild(gradlePluginBuildDir.toString())
} else {
  // Fallback: find any version
  new File(rootDir, "node_modules/.pnpm").eachDir { dir ->
    if (dir.name.startsWith("@react-native+gradle-plugin")) {
      def pluginDir = new File(dir, "node_modules/@react-native/gradle-plugin")
      if (pluginDir.exists()) {
        includeBuild(pluginDir.toString())
        return
      }
    }
  }
}
