pluginManagement {
  def version = providers.exec {
    commandLine("node", "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()
  def (_, reactNativeMinor, reactNativePatch) = version.split("-")[0].tokenize('.').collect { it.toInteger() }

  includeBuild(new File(["node", "--print", "require.resolve('@react-native/gradle-plugin/package.json')"].execute(null, rootDir).text.trim()).getParentFile().toString())
  if(reactNativeMinor == 74 && reactNativePatch <= 3){
    includeBuild("react-settings-plugin")
  }
}

plugins { id("com.facebook.react.settings") }

def getRNMinorVersion() {
  def version = providers.exec {
    commandLine("node", "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()

  def coreVersion = version.split("-")[0]
  def (major, minor, patch) = coreVersion.tokenize('.').collect { it.toInteger() }

  return minor
}

if (getRNMinorVersion() >= 75) {
  extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    // Always run our committed script regardless of EXPO_UNSTABLE_CORE_AUTOLINKING.
    // EAS may set that env var internally; the expo-modules-autolinking command it
    // triggers can omit packageName on pnpm projects. Our script has three fallbacks
    // that guarantee packageName is always present.
    def scriptPath = new File(rootDir.parentFile, 'scripts/generate-autolinking-config.js').absolutePath
    println "[autolinking] running: node ${scriptPath}"

    def stdout = new StringWriter()
    def stderr = new StringWriter()
    def proc = ['node', '--no-warnings', scriptPath].execute(null, rootDir.parentFile)
    proc.consumeProcessOutput(stdout, stderr)
    proc.waitFor()

    def configJson = stdout.toString().trim()
    def exitCode = proc.exitValue()

    println "[autolinking] exit=${exitCode} length=${configJson.length()}"
    if (!stderr.toString().isEmpty()) {
      println "[autolinking] stderr=${stderr.toString().take(500)}"
    }

    if (exitCode != 0 || configJson.isEmpty()) {
      throw new GradleException("[autolinking] script failed (exit=${exitCode}): ${stderr}")
    }

    def pkgNameMatch = configJson =~ /"packageName"\s*:\s*"([^"]+)"/
    if (pkgNameMatch) {
      println "[autolinking] packageName=${pkgNameMatch[0][1]}"
    } else {
      println "[autolinking] WARNING: packageName missing! first 300 chars: ${configJson.take(300)}"
    }

    // Write to a DIFFERENT path than RNGP's outputFile (autolinking.json).
    // autolinkLibrariesFromConfigFile does copyTo(outputFile, overwrite=true).
    // If we pass the same path, Kotlin deletes the file then fails to reopen it.
    // Using autolinking-input.json avoids the same-file copyTo bug.
    def inputFile = new File(rootDir, "build/generated/autolinking/autolinking-input.json")
    inputFile.parentFile.mkdirs()
    inputFile.text = configJson
    println "[autolinking] wrote ${configJson.length()} bytes to ${inputFile.absolutePath}"

    ex.autolinkLibrariesFromConfigFile(inputFile)
  }
}

rootProject.name = 'SubTrimmer'

