pluginManagement {
  def version = providers.exec {
    commandLine("node", "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()
  def (_, reactNativeMinor, reactNativePatch) = version.split("-")[0].tokenize('.').collect { it.toInteger() }

  // Fix: Search for gradle plugin in node_modules without assuming pnpm structure
  def gradlePluginDir = null
  def nodeModulesDir = new File(rootDir, "node_modules")
  
  if (nodeModulesDir.exists()) {
    // Try direct path first
    def directPath = new File(nodeModulesDir, "@react-native/gradle-plugin")
    if (directPath.exists()) {
      gradlePluginDir = directPath
    } else {
      // Search recursively for gradle-plugin
      nodeModulesDir.traverse { file ->
        if (file.name == "gradle-plugin" && file.parent.name == "@react-native") {
          gradlePluginDir = file
          return
        }
      }
    }
  }
  
  if (gradlePluginDir && gradlePluginDir.exists()) {
    includeBuild(gradlePluginDir.toString())
  }
  
  if(reactNativeMinor == 74 && reactNativePatch <= 3){
    includeBuild("react-settings-plugin")
  }
}

plugins { id("com.facebook.react.settings") }

def getRNMinorVersion() {
  def version = providers.exec {
    commandLine("node", "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()

  def coreVersion = version.split("-")[0]
  def (major, minor, patch) = coreVersion.tokenize('.').collect { it.toInteger() }

  return minor
}

if (getRNMinorVersion() >= 75) {
  extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    if (System.getenv('EXPO_UNSTABLE_CORE_AUTOLINKING') == '1') {
      println('\u001B[32mUsing expo-modules-autolinking as core autolinking source\u001B[0m')
      def command = [
        'node',
        '--no-warnings',
        '--eval',
        'require(require.resolve(\'expo-modules-autolinking\', { paths: [require.resolve(\'expo/package.json\')] }))(process.argv.slice(1))',
        'react-native-config',
        '--json',
        '--platform',
        'android'
      ].toList()
      ex.autolinkLibrariesFromCommand(command)
    } else {
      ex.autolinkLibrariesFromCommand()
    }
  }
}

rootProject.name = 'SubTrimmer'

dependencyResolutionManagement {
  versionCatalogs {
    reactAndroidLibs {
      // Search for react-native gradle libs
      def libsFile = null
      def nodeModulesDir = new File(rootDir, "node_modules")
      
      if (nodeModulesDir.exists()) {
        // Try direct path first
        def directPath = new File(nodeModulesDir, "react-native/gradle/libs.versions.toml")
        if (directPath.exists()) {
          libsFile = directPath
        } else {
          // Search recursively
          nodeModulesDir.traverse { file ->
            if (file.name == "libs.versions.toml" && file.parent.name == "gradle") {
              libsFile = file
              return
            }
          }
        }
      }
      
      if (libsFile && libsFile.exists()) {
        from(files(libsFile))
      }
    }
  }
}

// Search for expo autolinking script
def expoDir = null
def nodeModulesDir = new File(rootDir, "node_modules")

if (nodeModulesDir.exists()) {
  // Try direct path first
  def directPath = new File(nodeModulesDir, "expo/scripts/autolinking.gradle")
  if (directPath.exists()) {
    expoDir = directPath.getParentFile().getParentFile()
  } else {
    // Search recursively
    nodeModulesDir.traverse { file ->
      if (file.name == "autolinking.gradle" && file.parent.name == "scripts") {
        expoDir = file.getParentFile().getParentFile()
        return
      }
    }
  }
}

if (expoDir && expoDir.exists()) {
  apply from: new File(expoDir, "scripts/autolinking.gradle");
  useExpoModules()
}

if (getRNMinorVersion() < 75) {
  // Search for native modules script
  def nativeModulesDir = null
  def nodeModulesDir2 = new File(rootDir, "node_modules")
  
  if (nodeModulesDir2.exists()) {
    // Try direct path first
    def directPath = new File(nodeModulesDir2, "@react-native-community/cli-platform-android/native_modules.gradle")
    if (directPath.exists()) {
      nativeModulesDir = directPath.getParentFile().getParentFile()
    } else {
      // Search recursively
      nodeModulesDir2.traverse { file ->
        if (file.name == "native_modules.gradle") {
          nativeModulesDir = file.getParentFile().getParentFile()
          return
        }
      }
    }
  }
  
  if (nativeModulesDir && nativeModulesDir.exists()) {
    apply from: new File(nativeModulesDir, "native_modules.gradle");
    applyNativeModulesSettingsGradle(settings)
  }
}

include ':app'

// Search for gradle plugin for includeBuild
def gradlePluginBuildDir = null
def nodeModulesDir3 = new File(rootDir, "node_modules")

if (nodeModulesDir3.exists()) {
  // Try direct path first
  def directPath = new File(nodeModulesDir3, "@react-native/gradle-plugin")
  if (directPath.exists()) {
    gradlePluginBuildDir = directPath
  } else {
    // Search recursively
    nodeModulesDir3.traverse { file ->
      if (file.name == "gradle-plugin" && file.parent.name == "@react-native") {
        gradlePluginBuildDir = file
        return
      }
    }
  }
}

if (gradlePluginBuildDir && gradlePluginBuildDir.exists()) {
  includeBuild(gradlePluginBuildDir.toString())
}
