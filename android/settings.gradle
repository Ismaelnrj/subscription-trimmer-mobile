pluginManagement {
  def version = providers.exec {
    commandLine("node", "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()
  def (_, reactNativeMinor, reactNativePatch) = version.split("-")[0].tokenize('.').collect { it.toInteger() }

  includeBuild(new File(["node", "--print", "require.resolve('@react-native/gradle-plugin/package.json')"].execute(null, rootDir).text.trim()).getParentFile().toString())
  if(reactNativeMinor == 74 && reactNativePatch <= 3){
    includeBuild("react-settings-plugin")
  }
}

plugins { id("com.facebook.react.settings") }

def getRNMinorVersion() {
  def version = providers.exec {
    commandLine("node", "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()

  def coreVersion = version.split("-")[0]
  def (major, minor, patch) = coreVersion.tokenize('.').collect { it.toInteger() }

  return minor
}

if (getRNMinorVersion() >= 75) {
  // ── Step 1: run our script via plain Groovy exec (not settings.providers.exec)
  // to get the full autolinking config as JSON.
  def scriptPath = new File(rootDir.parentFile, 'scripts/generate-autolinking-config.js').absolutePath
  def scriptOut = new StringWriter()
  def scriptErr = new StringWriter()
  def scriptProc = ['node', '--no-warnings', scriptPath].execute(null, rootDir.parentFile)
  scriptProc.consumeProcessOutput(scriptOut, scriptErr)
  scriptProc.waitFor()
  def configJson = scriptOut.toString().trim()

  if (scriptProc.exitValue() != 0 || configJson.isEmpty()) {
    throw new GradleException("[autolinking] script failed (exit=${scriptProc.exitValue()}): ${scriptErr.toString().take(500)}")
  }

  // ── Step 2: write autolinking.json DIRECTLY so generateAutolinkingPackageList
  // always reads the correct file regardless of RNGP caching.
  def autolinkingJson = new File(rootDir, 'build/generated/autolinking/autolinking.json')
  autolinkingJson.parentFile.mkdirs()
  autolinkingJson.text = configJson

  // ── Step 3: tell RNGP which libraries to include as Gradle subprojects.
  // We pass a staging file (not autolinking.json itself) so copyTo never
  // operates on the same source and destination.
  def stagingFile = new File(rootDir, 'build/generated/autolinking/autolinking-staging.json')
  stagingFile.text = configJson

  extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromConfigFile(stagingFile)
    // autolinkLibrariesFromConfigFile copies stagingFile -> autolinking.json (same
    // content) and calls linkLibraries() to settings.include each Android library.
  }
}

rootProject.name = 'SubTrimmer'

dependencyResolutionManagement {
  versionCatalogs {
    reactAndroidLibs {
      from(files(new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim(), "../gradle/libs.versions.toml")))
    }
  }
}

apply from: new File(["node", "--print", "require.resolve('expo/package.json')"].execute(null, rootDir).text.trim(), "../scripts/autolinking.gradle");
useExpoModules()

if (getRNMinorVersion() < 75) {
  apply from: new File(["node", "--print", "require.resolve('@react-native-community/cli-platform-android/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim(), "../native_modules.gradle");
  applyNativeModulesSettingsGradle(settings)
}

include ':app'
includeBuild(new File(["node", "--print", "require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile())
