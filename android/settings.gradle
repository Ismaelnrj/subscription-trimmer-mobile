pluginManagement {
  def version = providers.exec {
    commandLine("node", "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()
  def (_, reactNativeMinor, reactNativePatch) = version.split("-")[0].tokenize('.').collect { it.toInteger() }

  try {
    def gradlePluginPath = ["node", "--print", "require.resolve('@react-native/gradle-plugin/package.json')"].execute(rootDir).text.trim()
    if (gradlePluginPath && gradlePluginPath != "null") {
      includeBuild(new File(gradlePluginPath).getParentFile().toString())
    }
  } catch (Exception e) {
    println("Warning: Could not resolve @react-native/gradle-plugin: " + e.message)
  }
  
  if(reactNativeMinor == 74 && reactNativePatch <= 3){
    includeBuild("react-settings-plugin")
  }
}

plugins { id("com.facebook.react.settings") }

def getRNMinorVersion() {
  def version = providers.exec {
    commandLine("node", "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()

  def coreVersion = version.split("-")[0]
  def (major, minor, patch) = coreVersion.tokenize('.').collect { it.toInteger() }

  return minor
}

if (getRNMinorVersion() >= 75) {
  extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    if (System.getenv('EXPO_UNSTABLE_CORE_AUTOLINKING') == '1') {
      println('\u001B[32mUsing expo-modules-autolinking as core autolinking source\u001B[0m')
      def command = [
        'node',
        '--no-warnings',
        '--eval',
        'require(require.resolve(\'expo-modules-autolinking\', { paths: [require.resolve(\'expo/package.json\')] }))(process.argv.slice(1))',
        'react-native-config',
        '--json',
        '--platform',
        'android'
      ].toList()
      ex.autolinkLibrariesFromCommand(command)
    } else {
      ex.autolinkLibrariesFromCommand()
    }
  }
}

rootProject.name = 'SubTrimmer'

dependencyResolutionManagement {
  versionCatalogs {
    reactAndroidLibs {
      try {
        def reactNativePath = ["node", "--print", "require.resolve('react-native/package.json')"].execute(rootDir).text.trim()
        if (reactNativePath && reactNativePath != "null") {
          from(files(new File(reactNativePath, "../gradle/libs.versions.toml")))
        }
      } catch (Exception e) {
        println("Warning: Could not resolve react-native gradle libs: " + e.message)
      }
    }
  }
}

try {
  def expoPath = ["node", "--print", "require.resolve('expo/package.json')"].execute(rootDir).text.trim()
  if (expoPath && expoPath != "null") {
    apply from: new File(expoPath, "../scripts/autolinking.gradle")
  }
} catch (Exception e) {
  println("Warning: Could not resolve expo autolinking: " + e.message)
}

useExpoModules()

if (getRNMinorVersion() < 75) {
  try {
    def nativeModulesPath = ["node", "--print", "require.resolve('@react-native-community/cli-platform-android/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(rootDir).text.trim()
    if (nativeModulesPath && nativeModulesPath != "null") {
      apply from: new File(nativeModulesPath, "../native_modules.gradle")
      applyNativeModulesSettingsGradle(settings)
    }
  } catch (Exception e) {
    println("Warning: Could not apply native modules: " + e.message)
  }
}

include ':app'

try {
  def gradlePluginPath = ["node", "--print", "require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(rootDir).text.trim()
  if (gradlePluginPath && gradlePluginPath != "null") {
    includeBuild(new File(gradlePluginPath).getParentFile())
  }
} catch (Exception e) {
  println("Warning: Could not include @react-native/gradle-plugin build: " + e.message)
}
