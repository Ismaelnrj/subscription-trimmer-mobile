pluginManagement {
  def version = providers.exec {
    commandLine("node", "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()
  def (_, reactNativeMinor, reactNativePatch) = version.split("-")[0].tokenize('.').collect { it.toInteger() }

  includeBuild(new File(["node", "--print", "require.resolve('@react-native/gradle-plugin/package.json')"].execute(null, rootDir).text.trim()).getParentFile().toString())
  if(reactNativeMinor == 74 && reactNativePatch <= 3){
    includeBuild("react-settings-plugin")
  }
}

plugins { id("com.facebook.react.settings") }

def getRNMinorVersion() {
  def version = providers.exec {
    commandLine("node", "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()

  def coreVersion = version.split("-")[0]
  def (major, minor, patch) = coreVersion.tokenize('.').collect { it.toInteger() }

  return minor
}

if (getRNMinorVersion() >= 75) {
  extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    if (System.getenv('EXPO_UNSTABLE_CORE_AUTOLINKING') == '1') {
      println('[32mUsing expo-modules-autolinking as core autolinking source[0m')
      def command = [
        'node',
        '--no-warnings',
        '--eval',
        'require(require.resolve(\'expo-modules-autolinking\', { paths: [require.resolve(\'expo/package.json\')] }))(process.argv.slice(1))',
        'react-native-config',
        '--json',
        '--platform',
        'android'
      ].toList()
      ex.autolinkLibrariesFromCommand(command)
    } else {
      // Run our committed script via Groovy exec (no Gradle provider, no npx) and
      // bypass autolinkLibrariesFromCommand entirely to avoid its caching layer.
      def scriptPath = new File(rootDir.parentFile, 'scripts/generate-autolinking-config.js').absolutePath
      println "[autolinking] Running: node ${scriptPath}"

      def stdout = new StringWriter()
      def stderr = new StringWriter()
      def proc = ['node', '--no-warnings', scriptPath].execute(null, rootDir.parentFile)
      proc.consumeProcessOutput(stdout, stderr)
      proc.waitFor()

      def configJson = stdout.toString()
      def exitCode = proc.exitValue()

      println "[autolinking] exit=${exitCode}, stdout_length=${configJson.length()}"
      if (!stderr.toString().isEmpty()) {
        println "[autolinking] stderr=${stderr.toString().take(500)}"
      }

      if (exitCode != 0 || configJson.isEmpty()) {
        throw new GradleException("[autolinking] generate-autolinking-config.js failed (exit=${exitCode})\nstderr: ${stderr}")
      }

      // Verify packageName is present before passing the file to RNGP
      def pkgNameMatch = configJson =~ /"packageName"\s*:\s*"([^"]+)"/
      if (pkgNameMatch) {
        println "[autolinking] packageName found: ${pkgNameMatch[0][1]}"
      } else {
        println "[autolinking] WARNING: packageName NOT found in script output!"
        println "[autolinking] first 300 chars: ${configJson.take(300)}"
      }

      def inputFile = settings.layout.rootDirectory.file("build/generated/autolinking/autolinking-input.json").asFile
      inputFile.parentFile.mkdirs()
      inputFile.text = configJson

      ex.autolinkLibrariesFromConfigFile(inputFile)
    }
  }
}

rootProject.name = 'SubTrimmer'

dependencyResolutionManagement {
  versionCatalogs {
    reactAndroidLibs {
      from(files(new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim(), "../gradle/libs.versions.toml")))
    }
  }
}

apply from: new File(["node", "--print", "require.resolve('expo/package.json')"].execute(null, rootDir).text.trim(), "../scripts/autolinking.gradle");
useExpoModules()

if (getRNMinorVersion() < 75) {
  apply from: new File(["node", "--print", "require.resolve('@react-native-community/cli-platform-android/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim(), "../native_modules.gradle");
  applyNativeModulesSettingsGradle(settings)
}

include ':app'
includeBuild(new File(["node", "--print", "require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile())
