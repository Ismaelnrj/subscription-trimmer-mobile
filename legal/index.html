<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trimio — Legal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F9FAFB; color: #111827; font-family: system-ui, -apple-system, sans-serif; font-size: 15px; line-height: 1.7; padding: 32px 16px; }
    .wrap { max-width: 720px; margin: 0 auto; }
    .logo { font-size: 26px; font-weight: 900; color: #7746DD; letter-spacing: -0.5px; margin-bottom: 4px; }
    h1 { font-size: 22px; font-weight: 800; color: #111827; margin-bottom: 4px; }
    .meta { font-size: 13px; color: #6B7280; margin-bottom: 36px; }
    p { color: #374151; margin-bottom: 12px; }
    a { color: #7746DD; }
    .links { list-style: none; margin-top: 24px; }
    .links li { margin-bottom: 12px; }
    .links a {
      display: inline-block; font-weight: 600; font-size: 16px;
      padding: 14px 20px; border: 1px solid #E5E7EB; border-radius: 10px;
      background: #FFFFFF; width: 100%; text-decoration: none; color: #111827;
    }
    .links a:hover { border-color: #7746DD; }
    hr { border: none; border-top: 1px solid #E5E7EB; margin: 32px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Trimio</div>
    <h1>Legal</h1>
    <p class="meta">Policies governing your use of Trimio</p>

    <p>Trimio is a personal subscription tracking app. The documents below explain how we handle your data and the terms under which you use the app.</p>

    <ul class="links">
      <li><a href="privacy.html">Privacy Policy →</a></li>
      <li><a href="terms.html">Terms of Service →</a></li>
    </ul>

    <hr />
    <p style="font-size:12px;color:#9CA3AF;">© 2026 Trimio. All rights reserved.</p>
  </div>
</body>
</html>
