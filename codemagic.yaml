workflows:
  android-build:
    name: Android Build
    instance_type: linux_x2
    max_build_duration: 120
    environment:
      node: 18
      java: 17
      groups:
        - expo_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install -g eas-cli
          pnpm install
      - name: Prebuild native Android
        script: |
          npx expo prebuild --platform android --clean
      - name: Apply Gradle compatibility fixes
        script: |
          bash fix-gradle.sh
      - name: Bundle JavaScript (Metro)
        script: |
          # Run the JS bundle step in isolation so any Metro error is clearly visible.
          # This is the same operation Gradle's createBundleReleaseJsAndAssets runs.
          ENTRY=$(node -e "process.stdout.write(require('expo/scripts/resolveAppEntry')('$(pwd)', 'android', 'absolute'))")
          echo "Entry file: $ENTRY"
          ./node_modules/.bin/expo export:embed \
            --platform android \
            --dev false \
            --entry-file "$ENTRY" \
            --bundle-output /tmp/index.android.bundle \
            --assets-dest /tmp/android-assets/ 2>&1
      - name: Build Android APK with Gradle
        script: |
          cd android
          ./gradlew assembleRelease
          cd ..
    artifacts:
      - app/build/outputs/**/*.apk
    publishing:
      scripts:
        - name: Generate Download URL
          script: |
            echo "Build completed successfully!"
            echo "Artifacts available at: $CM_ARTIFACT_LINKS"
            # Extract APK URL from artifact links
            APK_URL=$(echo $CM_ARTIFACT_LINKS | grep -oP '(?<="url":")[^"]*apk[^"]*' | head -1)
            if [ -z "$APK_URL" ]; then
              echo "APK URL: Check Codemagic dashboard for artifacts"
            else
              echo "APK Download URL: $APK_URL"
            fi
