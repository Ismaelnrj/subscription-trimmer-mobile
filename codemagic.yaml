workflows:
  android-build:
    name: Android Build
    instance_type: linux_x4
    max_build_duration: 60
    environment:
      node: 18
      java: 17
      groups:
        - expo_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install -g eas-cli
          pnpm install
      - name: Prebuild native Android
        script: |
          npx expo prebuild --platform android --clean
      - name: Apply Gradle compatibility fixes
        script: |
          bash fix-gradle.sh
      - name: Build Android APK with Gradle
        script: |
          cd android
          ./gradlew assembleRelease --no-daemon --build-cache
          cd ..
    artifacts:
      - android/app/build/outputs/**/*.apk
    publishing:
      scripts:
        - name: Generate Download URL
          script: |
            echo "Build completed successfully!"
            echo "Artifacts available at: $CM_ARTIFACT_LINKS"
