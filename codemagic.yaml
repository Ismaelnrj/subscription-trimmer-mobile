workflows:
  android-build:
    name: Android Build
    instance_type: linux_x2
    max_build_duration: 120
    environment:
      node: 18
      java: 17
      groups:
        - expo_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install -g eas-cli
          pnpm install
      - name: Prebuild native Android
        script: |
          npx expo prebuild --platform android --clean
      - name: Apply Gradle compatibility fixes
        script: |
          bash fix-gradle.sh
      - name: Build Android APK with Gradle
        script: |
          cd android
          ./gradlew assembleRelease
          cd ..
    artifacts:
      - android/app/build/outputs/**/*.apk
    publishing:
      scripts:
        - name: Generate Download URL
          script: |
            echo "Build completed successfully!"
            echo "Artifacts available at: $CM_ARTIFACT_LINKS"
            APK_URL=$(echo $CM_ARTIFACT_LINKS | grep -oP '(?<="url":")[^"]*apk[^"]*' | head -1)
            if [ -z "$APK_URL" ]; then
              echo "APK URL: Check Codemagic dashboard for artifacts"
            else
              echo "APK Download URL: $APK_URL"
            fi
