workflows:
  android-build:
    name: Android Build
    instance_type: linux_x2
    max_build_duration: 120
    environment:
      node: 18
      java: 17
      groups:
        - expo_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install -g eas-cli
          pnpm install
      - name: Prebuild native Android
        script: |
          npx expo prebuild --platform android --clean
      - name: Apply Gradle compatibility fixes
        script: |
          bash fix-gradle.sh
      - name: Test Metro JS bundle (diagnostic)
        script: |
          NODE_ENV=production npx expo export:embed \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output /tmp/android-bundle.js \
            --assets-dest /tmp/android-assets \
            --platform android \
            --dev false 2>&1
          echo "Metro exit code: $?"
      - name: Build Android AAB with Gradle
        script: |
          cd android
          ./gradlew bundleRelease
          cd ..
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      scripts:
        - name: Generate Download URL
          script: |
            echo "Build completed successfully!"
            echo "Artifacts available at: $CM_ARTIFACT_LINKS"
            AAB_URL=$(echo $CM_ARTIFACT_LINKS | grep -oP '(?<="url":")[^"]*aab[^"]*' | head -1)
            if [ -z "$AAB_URL" ]; then
              echo "AAB URL: Check Codemagic dashboard for artifacts"
            else
              echo "AAB Download URL: $AAB_URL"
            fi
