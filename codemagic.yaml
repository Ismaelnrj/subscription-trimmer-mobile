workflows:
  android-build:
    name: Android Build
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      node: 18
      java: 17
      groups:
        - expo_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install -g eas-cli
          pnpm install
      - name: Prebuild native Android
        script: |
          npx expo prebuild --platform android --clean
      - name: Apply Gradle compatibility fixes
        script: |
          bash fix-gradle.sh
      - name: Build Android AAB with Gradle
        script: |
          cd android
          if [ -n "$CM_KEYSTORE" ]; then
            echo $CM_KEYSTORE | base64 --decode > /tmp/release.keystore
            ./gradlew bundleRelease --no-daemon --build-cache \
              -Pandroid.injected.signing.store.file=/tmp/release.keystore \
              -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
          else
            ./gradlew bundleRelease --no-daemon --build-cache
          fi
          cd ..
    artifacts:
      - android/app/build/outputs/bundle/**/*.aab
    publishing:
      scripts:
        - name: Generate Download URL
          script: |
            echo "Build completed successfully!"
            echo "Artifacts available at: $CM_ARTIFACT_LINKS"
