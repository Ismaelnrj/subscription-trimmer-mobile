workflows:
  android-build:
    name: Android Build
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      node: 18
      java: 17
      groups:
        - expo_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install -g eas-cli
          pnpm install
      - name: Prebuild native Android
        script: |
          npx expo prebuild --platform android --clean
      - name: Apply Gradle compatibility fixes
        script: |
          bash fix-gradle.sh
      - name: Set up Android signing
        script: |
          echo "CM_KEYSTORE set: $([ -n "$CM_KEYSTORE" ] && echo yes || echo no)"
          echo "CM_KEYSTORE_PASSWORD set: $([ -n "$CM_KEYSTORE_PASSWORD" ] && echo yes || echo no)"
          echo "CM_KEY_ALIAS set: $([ -n "$CM_KEY_ALIAS" ] && echo yes || echo no)"
          echo "CM_KEY_PASSWORD set: $([ -n "$CM_KEY_PASSWORD" ] && echo yes || echo no)"
          KEYSTORE_PATH=/tmp/release.keystore
          if [ -n "$CM_KEYSTORE" ]; then
            echo $CM_KEYSTORE | base64 --decode > $KEYSTORE_PATH
            echo "Using existing keystore from CM_KEYSTORE env var."
          elif [ -n "$CM_KEYSTORE_PASSWORD" ]; then
            echo "Generating new release keystore..."
            keytool -genkey -v \
              -keystore $KEYSTORE_PATH \
              -alias ${CM_KEY_ALIAS:-trimio} \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass $CM_KEYSTORE_PASSWORD \
              -keypass $CM_KEY_PASSWORD \
              -dname "CN=Trimio, OU=Mobile, O=Trimio, L=Unknown, ST=Unknown, C=US" \
              -noprompt
            echo "=== COPY THIS AND SAVE AS CM_KEYSTORE ENV VAR FOR FUTURE BUILDS ==="
            base64 $KEYSTORE_PATH
            echo "==================================================================="
          else
            echo "ERROR: CM_KEYSTORE_PASSWORD is not set. Cannot sign release build."
            exit 1
          fi
      - name: Build Android AAB with Gradle
        script: |
          KEYSTORE_PATH=/tmp/release.keystore
          cd android
          ./gradlew bundleRelease --no-daemon --build-cache \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=${CM_KEY_ALIAS:-trimio} \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
          cd ..
    artifacts:
      - android/app/build/outputs/bundle/**/*.aab
    publishing:
      scripts:
        - name: Generate Download URL
          script: |
            echo "Build completed successfully!"
            echo "Artifacts available at: $CM_ARTIFACT_LINKS"
