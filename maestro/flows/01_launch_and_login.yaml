appId: com.trimio.app
---
# Smoke test: the app boots past the splash screen to a real screen (login
# or the tabs, depending on whether a session is already stored), then a
# fresh login succeeds and lands on the Dashboard. Subscriptions no longer
# has its own tab bar icon, so it's reached via the floating + button instead.
- launchApp:
    clearState: true
- assertVisible:
    text: "Sign In"
    timeout: 15000
- tapOn:
    text: "Email"
- inputText: "${MAESTRO_TEST_EMAIL}"
- tapOn:
    text: "Password"
- inputText: "${MAESTRO_TEST_PASSWORD}"
- tapOn:
    text: "Sign In"
- assertVisible:
    text: "Trimio"
    timeout: 15000
- tapOn:
    text: "Add subscription"
- assertVisible:
    text: "My Subscriptions"
    timeout: 5000
