appId: com.trimio.app
---
# Covers the core loop: add a subscription, confirm it's listed, delete it,
# and confirm the savings toast appears. Assumes 01_launch_and_login already
# got the test account authenticated (Maestro keeps app state between flows
# in the same run unless clearState is used).
- launchApp
- tapOn:
    text: "Subscriptions"
- tapOn:
    text: "Add"
- tapOn:
    text: "Subscription name (e.g. Netflix)"
- inputText: "Maestro Test Sub"
- tapOn:
    text: "Price in.*"
- inputText: "9.99"
- hideKeyboard
- tapOn:
    text: "^Add$"
- assertVisible: "Maestro Test Sub"

# Swipe the card left to reveal the delete action, then confirm.
- swipe:
    from: "Maestro Test Sub"
    direction: LEFT
- tapOn: "Delete"
- tapOn:
    text: "Delete"
- assertVisible:
    text: "saved.*this year"
    timeout: 5000
- assertNotVisible: "Maestro Test Sub"
