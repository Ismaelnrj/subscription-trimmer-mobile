name: Build Android App

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Find project root
        id: find_root
        run: |
          PROJECT_ROOT=$(find . -not -path '*/node_modules/*' -name "package.json" -type f | head -1 | xargs dirname)
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_OUTPUT
          echo "Found project at: $PROJECT_ROOT"
          ls -la "$PROJECT_ROOT"
          echo "Checking for android directory:"
          ls -la "$PROJECT_ROOT/android" || echo "Android directory not found"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        run: |
          cd "${{ steps.find_root.outputs.PROJECT_ROOT }}"
          pnpm install
      
      - name: Decode keystore
        run: |
          PROJECT_ROOT="${{ steps.find_root.outputs.PROJECT_ROOT }}"
          mkdir -p "$PROJECT_ROOT/android/app"
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$PROJECT_ROOT/android/app/release.keystore"
          ls -la "$PROJECT_ROOT/android/app/release.keystore"
      
      - name: Build Android App Bundle
        run: |
          PROJECT_ROOT="${{ steps.find_root.outputs.PROJECT_ROOT }}"
          cd "$PROJECT_ROOT/android"
          chmod +x gradlew
          ./gradlew bundleRelease
        env:
          JAVA_OPTS: '-Xmx4096m'
          KEYSTORE_PATH: 'app/release.keystore'
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: '**/app-release.aab'
          retention-days: 30
      
      - name: Create Release
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Build ${{ github.run_number }}
          body: |
            Android App Bundle (AAB) built successfully!
            
            Download the app-release.aab file from the artifacts.
            
            Ready to upload to Google Play Store.
          draft: false
          prerelease: false
      
      - name: Upload Release Asset
        if: success()
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: '**/app-release.aab'
          asset_name: app-release.aab
          asset_content_type: application/octet-stream
