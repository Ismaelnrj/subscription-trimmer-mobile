name: Build Android App

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: KEYSTORE_BASE64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Verify project structure
        run: |
          echo "Current directory: $(pwd)"
          echo "Contents:"
          ls -la
          
          # Check if we're in the nested folder
          if [ -f "package.json" ] && [ -d "android" ]; then
            echo "✓ Already at project root"
            echo "PROJECT_DIR=$(pwd)" >> $GITHUB_ENV
          else
            echo "In nested folder, moving up..."
            cd ..
            echo "✓ Moved to parent directory"
            echo "PROJECT_DIR=$(pwd)" >> $GITHUB_ENV
          fi
          
          echo ""
          echo "Final project directory: $PROJECT_DIR"
          [ -f "$PROJECT_DIR/package.json" ] && echo "✓ package.json found" || echo "✗ package.json NOT found"
          [ -d "$PROJECT_DIR/android" ] && echo "✓ android directory found" || echo "✗ android directory NOT found"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: pnpm install
      
      - name: Decode keystore
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "::error::KEYSTORE_BASE64 repo secret is empty or unset. Without it, this build" \
                 "cannot produce a properly signed release AAB. Set KEYSTORE_BASE64," \
                 "KEYSTORE_PASSWORD, KEY_ALIAS, and KEY_PASSWORD in" \
                 "Settings > Secrets and variables > Actions before re-running."
            exit 1
          fi
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          if [ ! -s android/app/release.keystore ]; then
            echo "::error::Decoded keystore is empty — KEYSTORE_BASE64 is not valid base64 of a keystore file."
            exit 1
          fi
          ls -la android/app/release.keystore

      - name: Build Android App Bundle
        working-directory: ${{ env.PROJECT_DIR }}/android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/app/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"
        env:
          JAVA_OPTS: '-Xmx4096m'
      
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: ${{ env.PROJECT_DIR }}/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
      
      - name: Create Release
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Build ${{ github.run_number }}
          body: |
            Android App Bundle (AAB) built successfully!
            
            Download the app-release.aab file from the artifacts.
            
            Ready to upload to Google Play Store.
          draft: false
          prerelease: false
      
      - name: Upload Release Asset
        if: success()
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.PROJECT_DIR }}/android/app/build/outputs/bundle/release/app-release.aab
          asset_name: app-release.aab
          asset_content_type: application/octet-stream
