name: Build Android App

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Flatten nested directory structure
        run: |
          echo "Current directory: $(pwd)"
          echo "Directory listing:"
          ls -la
          
          # Check if there's a nested subscription-trimmer-mobile directory
          if [ -d "subscription-trimmer-mobile" ] && [ -f "subscription-trimmer-mobile/package.json" ]; then
            echo "Found nested directory, flattening..."
            # Move all contents up one level
            mv subscription-trimmer-mobile/* .
            mv subscription-trimmer-mobile/.github .
            mv subscription-trimmer-mobile/.gitignore .
            mv subscription-trimmer-mobile/.eas .
            mv subscription-trimmer-mobile/.expo .
            # Remove the now-empty nested directory
            rmdir subscription-trimmer-mobile
            echo "Flattened successfully"
          else
            echo "No nested directory found, proceeding with current structure"
          fi
          
          echo "After flattening:"
          ls -la
          echo "Verifying package.json exists:"
          [ -f "package.json" ] && echo "✓ package.json found" || echo "✗ package.json NOT found"
          echo "Verifying android directory exists:"
          [ -d "android" ] && echo "✓ android directory found" || echo "✗ android directory NOT found"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Decode keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          echo "Keystore created at:"
          ls -la android/app/release.keystore
      
      - name: Build Android App Bundle
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease
        env:
          JAVA_OPTS: '-Xmx4096m'
          KEYSTORE_PATH: 'app/release.keystore'
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
      
      - name: Create Release
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Build ${{ github.run_number }}
          body: |
            Android App Bundle (AAB) built successfully!
            
            Download the app-release.aab file from the artifacts.
            
            Ready to upload to Google Play Store.
          draft: false
          prerelease: false
      
      - name: Upload Release Asset
        if: success()
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: android/app/build/outputs/bundle/release/app-release.aab
          asset_name: app-release.aab
          asset_content_type: application/octet-stream
