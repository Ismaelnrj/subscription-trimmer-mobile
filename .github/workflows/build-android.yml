name: Build Android App

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: KEYSTORE_BASE64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install

      # The android/ directory is intentionally gitignored (see "Stop
      # committing the generated android/ directory") - Codemagic already
      # regenerates it fresh on every build via prebuild + a Gradle 8
      # compatibility patch script, so this workflow does the same instead
      # of assuming a committed copy exists.
      - name: Prebuild native Android project
        run: npx expo prebuild --platform android --clean

      - name: Apply Gradle compatibility fixes
        run: bash fix-gradle.sh

      # fix-gradle.sh's JVM tuning (1.5GB heap / 512MB Metaspace) is
      # deliberately tight to fit Codemagic's linux_x2 instance (4GB total
      # RAM). GitHub-hosted ubuntu-latest runners have 16GB, so give this
      # environment more headroom instead — the tight Codemagic budget was
      # exactly what caused lintVitalAnalyzeRelease to hit a Metaspace
      # OutOfMemoryError on react-native-reanimated once react-native-svg
      # added another native module to the lint-vital work for this build.
      - name: Raise JVM memory limits for this runner's larger RAM budget
        run: |
          sed -i \
            -e '/^org\.gradle\.jvmargs/d' \
            -e '/^kotlin\.daemon\.jvm\.options/d' \
            android/gradle.properties
          cat >> android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+UseG1GC
          kotlin.daemon.jvm.options=-Xmx1536m -XX:MaxMetaspaceSize=512m
          EOF

      - name: Decode keystore
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "::error::KEYSTORE_BASE64 repo secret is empty or unset. Without it, this build" \
                 "cannot produce a properly signed release AAB. Set KEYSTORE_BASE64," \
                 "KEYSTORE_PASSWORD, KEY_ALIAS, and KEY_PASSWORD in" \
                 "Settings > Secrets and variables > Actions before re-running."
            exit 1
          fi
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          if [ ! -s android/app/release.keystore ]; then
            echo "::error::Decoded keystore is empty — KEYSTORE_BASE64 is not valid base64 of a keystore file."
            exit 1
          fi
          ls -la android/app/release.keystore

      - name: Build Android App Bundle + APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/app/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"
        env:
          JAVA_OPTS: '-Xmx4096m'

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create Release
        id: create_release
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Build ${{ github.run_number }}
          body: |
            Android App Bundle (AAB) + APK built successfully!

            - app-release.aab: upload this to Google Play Console.
            - app-release.apk: sideload this directly on a device for testing.
          draft: false
          prerelease: false

      - name: Upload AAB Release Asset
        if: success()
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: android/app/build/outputs/bundle/release/app-release.aab
          asset_name: app-release.aab
          asset_content_type: application/octet-stream

      - name: Upload APK Release Asset
        if: success()
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: android/app/build/outputs/apk/release/app-release.apk
          asset_name: app-release.apk
          asset_content_type: application/octet-stream
