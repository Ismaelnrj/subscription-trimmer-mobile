name: Build Android App

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Fix nested directory structure
        run: |
          echo "=== Current working directory ==="
          pwd
          echo ""
          echo "=== Current directory contents ==="
          ls -la
          echo ""
          
          # GitHub clones into /work/repo-name/repo-name/
          # Check if we're in the nested folder
          if [ ! -f "package.json" ] || [ ! -d "android" ]; then
            echo "Not at project root, moving up one level..."
            cd ..
            echo "New working directory:"
            pwd
            echo ""
            echo "Contents after moving up:"
            ls -la
          fi
          
          echo ""
          echo "=== Verification ==="
          [ -f "package.json" ] && echo "✓ package.json found" || echo "✗ package.json NOT found"
          [ -d "android" ] && echo "✓ android directory found" || echo "✗ android directory NOT found"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        run: |
          # Ensure we're in the right directory
          if [ ! -f "package.json" ]; then
            cd ..
          fi
          pnpm install
      
      - name: Decode keystore
        run: |
          # Ensure we're in the right directory
          if [ ! -f "package.json" ]; then
            cd ..
          fi
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          echo "Keystore created at:"
          ls -la android/app/release.keystore
      
      - name: Build Android App Bundle
        run: |
          # Ensure we're in the right directory
          if [ ! -f "package.json" ]; then
            cd ..
          fi
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
        env:
          JAVA_OPTS: '-Xmx4096m'
          KEYSTORE_PATH: 'app/release.keystore'
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
      
      - name: Create Release
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Build ${{ github.run_number }}
          body: |
            Android App Bundle (AAB) built successfully!
            
            Download the app-release.aab file from the artifacts.
            
            Ready to upload to Google Play Store.
          draft: false
          prerelease: false
      
      - name: Upload Release Asset
        if: success()
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: android/app/build/outputs/bundle/release/app-release.aab
          asset_name: app-release.aab
          asset_content_type: application/octet-stream
